<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa do Ecossistema — Claude</title>
<script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #F2F2F7;
    color: #1D1D1F;
    min-height: 100vh;
    overflow: hidden;
  }

  header {
    position: fixed; top: 0; left: 0; right: 0;
    background: rgba(242,242,247,0.92);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid #E5E5EA;
    padding: 14px 22px 12px;
    z-index: 20;
  }
  .header-bar { width: 48px; height: 4px; background: #E8611A; border-radius: 2px; margin-bottom: 10px; }
  .header-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  header h1 { font-size: 20px; font-weight: 700; color: #1D1D1F; letter-spacing: -0.3px; flex: 1; }
  header p { color: #6E6E73; font-size: 12px; margin-top: 4px; }
  .back-link {
    font-size: 13px; font-weight: 600; color: #E8611A;
    text-decoration: none; padding: 6px 12px; border-radius: 8px;
    background: #fff; border: 1px solid #E5E5EA;
    transition: background 0.15s;
  }
  .back-link:hover { background: #F2F2F7; }

  .filters {
    position: fixed; top: 92px; left: 22px; z-index: 15;
    background: #fff; border: 1px solid #E5E5EA; border-radius: 12px;
    padding: 10px 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    max-width: 300px;
  }
  .filters-title { font-size: 10px; font-weight: 700; color: #6E6E73; letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 7px; }
  .filter-group { display: flex; flex-wrap: wrap; gap: 5px; }
  .filter-chip {
    font-size: 12px; font-weight: 600; padding: 5px 10px;
    border-radius: 14px; background: #F2F2F7; color: #3A3A3C;
    cursor: pointer; user-select: none;
    transition: all 0.15s;
  }
  .filter-chip:hover { background: #E5E5EA; }
  .filter-chip.active { background: #E8611A; color: #fff; }

  .legend {
    position: fixed; bottom: 22px; left: 22px; z-index: 15;
    background: #fff; border: 1px solid #E5E5EA; border-radius: 12px;
    padding: 10px 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .legend-title { font-size: 10px; font-weight: 700; color: #6E6E73; letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 7px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #3A3A3C; margin-bottom: 4px; }
  .legend-item:last-child { margin-bottom: 0; }
  .legend-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 0 1px #E5E5EA; }

  #cy {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #F2F2F7;
  }

  .node-detail {
    position: fixed; bottom: 22px; right: 22px; z-index: 15;
    background: #fff; border: 1px solid #E5E5EA; border-radius: 14px;
    padding: 16px 18px; box-shadow: 0 8px 28px rgba(0,0,0,0.10);
    max-width: 340px; display: none;
  }
  .node-detail.open { display: block; }
  .node-detail-close {
    position: absolute; top: 10px; right: 10px;
    width: 24px; height: 24px; border-radius: 50%;
    background: #F2F2F7; border: none; cursor: pointer;
    color: #6E6E73; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .node-detail-close:hover { background: #E5E5EA; }
  .node-detail-type { font-size: 10px; font-weight: 700; color: #6E6E73; letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 4px; }
  .node-detail-name { font-size: 16px; font-weight: 700; color: #1D1D1F; margin-bottom: 6px; }
  .node-detail-desc { font-size: 13px; color: #3A3A3C; line-height: 1.5; margin-bottom: 10px; }
  .node-detail-section-title { font-size: 10px; font-weight: 700; color: #6E6E73; letter-spacing: 0.6px; text-transform: uppercase; margin-top: 10px; margin-bottom: 6px; }
  .node-detail-connections { display: flex; flex-wrap: wrap; gap: 5px; }
  .node-detail-connection {
    font-size: 12px; padding: 4px 9px; background: #F2F2F7;
    border-radius: 10px; color: #3A3A3C; cursor: pointer;
    transition: background 0.15s;
  }
  .node-detail-connection:hover { background: #E5E5EA; }

  .controls {
    position: fixed; top: 100px; right: 22px; z-index: 15;
    display: flex; flex-direction: column; gap: 6px;
  }
  .ctrl-btn {
    width: 36px; height: 36px; border-radius: 10px;
    background: #fff; border: 1px solid #E5E5EA;
    font-size: 16px; cursor: pointer; color: #1D1D1F;
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .ctrl-btn:hover { background: #F2F2F7; border-color: #E8611A; }

  @media (max-width: 720px) {
    .filters { left: 12px; right: 12px; top: 100px; max-width: none; }
    .legend { display: none; }
    .node-detail { left: 12px; right: 12px; max-width: none; bottom: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-bar"></div>
  <div class="header-row">
    <a href="./index.html" class="back-link">← Painel</a>
    <h1>Mapa do Ecossistema</h1>
  </div>
  <p>Clique em qualquer nó — filtre por área do trabalho que você faz</p>
</header>

<div class="filters">
  <div class="filters-title">Área</div>
  <div class="filter-group" id="area-filters">
    <span class="filter-chip active" data-area="all">Tudo</span>
    <span class="filter-chip" data-area="tecnologia">Tecnologia</span>
    <span class="filter-chip" data-area="conteudo">Conteúdo</span>
    <span class="filter-chip" data-area="marketing">Marketing</span>
    <span class="filter-chip" data-area="educacao">Educação</span>
  </div>
</div>

<div class="legend">
  <div class="legend-title">Tipos</div>
  <div class="legend-item"><span class="legend-dot" style="background:#1D1D1F;"></span>Hub</div>
  <div class="legend-item"><span class="legend-dot" style="background:#E8611A;"></span>Projeto</div>
  <div class="legend-item"><span class="legend-dot" style="background:#0D9488;"></span>Ferramenta</div>
</div>

<div class="controls">
  <button class="ctrl-btn" id="zoom-in" title="Aproximar">＋</button>
  <button class="ctrl-btn" id="zoom-out" title="Afastar">−</button>
  <button class="ctrl-btn" id="fit" title="Centralizar">◎</button>
</div>

<div id="cy"></div>

<div class="node-detail" id="node-detail">
  <button class="node-detail-close" id="node-detail-close">✕</button>
  <div class="node-detail-type" id="nd-type">TIPO</div>
  <div class="node-detail-name" id="nd-name">Nome</div>
  <div class="node-detail-desc" id="nd-desc"></div>
  <div class="node-detail-section-title" id="nd-conn-title" style="display:none;">Conectado com</div>
  <div class="node-detail-connections" id="nd-connections"></div>
</div>

<script>
// ── DADOS ──────────────────────────────────────────────────────────────────

const NODES = [
  // HUB CENTRAL
  { id: 'anti-caos', label: 'Anti-Caos', type: 'hub', areas: ['tecnologia','conteudo','marketing','educacao'], desc: 'Ecossistema central — Comunidade Anti-Caos (softskills.com.br).' },

  // SUB-HUBS DE ÁREA
  { id: 'area-tec', label: 'Tecnologia', type: 'hub', areas: ['tecnologia'], desc: 'Apps, plataformas, deploys, segurança.' },
  { id: 'area-con', label: 'Conteúdo', type: 'hub', areas: ['conteudo'], desc: 'Aulas, tutoriais, sprints, livros, design.' },
  { id: 'area-mkt', label: 'Marketing', type: 'hub', areas: ['marketing'], desc: 'Copy, funil, emails, lançamentos, vendas.' },
  { id: 'area-edu', label: 'Educação', type: 'hub', areas: ['educacao'], desc: 'DISC, soft skills, mentoria, assessments.' },

  // PROJETOS
  { id: 'p-assessment', label: 'App de Assessments', type: 'projeto', areas: ['tecnologia','educacao'], desc: 'Plataforma onde as pessoas fazem DISC e Soft Skills. No ar.', url: 'https://on.anti-caos.app.br' },
  { id: 'p-adultos', label: 'Assessments Adultos V2', type: 'projeto', areas: ['tecnologia','educacao'], desc: 'Nova versão dos assessments para adultos na Comunidade. No ar.' },
  { id: 'p-lider', label: 'Líder Anti-Caos', type: 'projeto', areas: ['tecnologia','educacao','marketing'], desc: 'Plataforma do Kit do Líder Indispensável. No ar.', url: 'https://gestao.anti-caos.app.br' },
  { id: 'p-painel', label: 'Painel Claude', type: 'projeto', areas: ['tecnologia'], desc: 'Este painel — dashboard pessoal. No ar.', url: 'https://painelclaude.anti-caos.app.br' },
  { id: 'p-tutoriais', label: 'Tutoriais Kit Líder', type: 'projeto', areas: ['conteudo','educacao'], desc: '6 tutoriais interativos do Kit do Líder. No ar.', url: 'https://klindispensavel.anti-caos.app.br' },
  { id: 'p-recopedro', label: 'Rec o Pedro Economia', type: 'projeto', areas: ['conteudo','marketing'], desc: 'Site do Pedro Economia. No ar.' },
  { id: 'p-indice', label: 'Índice de Caos', type: 'projeto', areas: ['educacao','marketing'], desc: 'Calculadora + relatório do Índice de Caos. No ar.' },
  { id: 'p-sprints', label: 'Sprints Educacionais', type: 'projeto', areas: ['conteudo','educacao'], desc: 'Em construção — acervo de sprints low-ticket.' },
  { id: 'p-quest', label: 'Quest DISC Jovens', type: 'projeto', areas: ['educacao'], desc: 'Em construção — DISC para 16-22 anos.' },
  { id: 'p-livro', label: 'Livro DISC', type: 'projeto', areas: ['conteudo','educacao'], desc: 'Em construção — livro sobre DISC e soft skills.' },
  { id: 'p-ltm', label: 'Low Ticket Maxxima V2', type: 'projeto', areas: ['marketing'], desc: 'Em construção — próxima versão do produto low-ticket.' },

  // FERRAMENTAS (nomeadas pelo que fazem)
  { id: 'f-aulas', label: 'Criar aulas interativas', type: 'ferramenta', areas: ['conteudo','educacao'], desc: 'Gera tutoriais HTML com digitação palavra-por-palavra.' },
  { id: 'f-sprints', label: 'Criar sprints educacionais', type: 'ferramenta', areas: ['conteudo','educacao'], desc: 'Monta sprints completos — outline, exercícios, materiais.' },
  { id: 'f-redes', label: 'Copy de redes sociais', type: 'ferramenta', areas: ['conteudo','marketing'], desc: 'Carrosséis, posts, reels. Fórmula P.R.S-A + Maxxima.' },
  { id: 'f-maxxima', label: 'Copy Maxxima', type: 'ferramenta', areas: ['marketing','conteudo'], desc: 'Landing, VSL, email, anúncio no sistema Maxxima.' },
  { id: 'f-lowticket', label: 'Criar produto low-ticket', type: 'ferramenta', areas: ['marketing'], desc: 'Método ILM — oferta, estrutura, página.' },
  { id: 'f-mentoria', label: 'Mentoria 1-on-1', type: 'ferramenta', areas: ['educacao'], desc: 'Planejamento e acompanhamento de mentorados.' },
  { id: 'f-disc', label: 'DISC (geral)', type: 'ferramenta', areas: ['educacao'], desc: 'Enciclopédia DISC + gerador de relatórios.' },
  { id: 'f-disc-jovens', label: 'DISC Jovens', type: 'ferramenta', areas: ['educacao'], desc: 'DISC para 16-22 anos.' },
  { id: 'f-success', label: 'Success Insights', type: 'ferramenta', areas: ['educacao'], desc: 'Roda Success Insights — Anti-Caos.' },
  { id: 'f-softskills', label: 'Assessments Soft Skills', type: 'ferramenta', areas: ['educacao'], desc: 'Enciclopédia de assessments e ferramentas.' },
  { id: 'f-brand', label: 'Brand do Kit Líder', type: 'ferramenta', areas: ['conteudo','marketing'], desc: 'Paleta, fontes, layouts oficiais.' },
  { id: 'f-plano', label: 'Plano MVP + PRD', type: 'ferramenta', areas: ['tecnologia'], desc: 'Planejamento de projetos web — PRD, fases, roadmap.' },
  { id: 'f-ideias', label: 'Avaliador de ideias', type: 'ferramenta', areas: ['marketing','conteudo'], desc: 'Testa nomes, títulos, tópicos com scores estilo VidIQ.' },
  { id: 'f-audita', label: 'Auditar segurança', type: 'ferramenta', areas: ['tecnologia'], desc: 'Verifica apps online + máquina local.' },
  { id: 'f-email', label: 'Sequências de email', type: 'ferramenta', areas: ['marketing'], desc: 'Onboarding, nurture, carrinho abandonado.' },
  { id: 'f-vendas', label: 'Prospecção e vendas', type: 'ferramenta', areas: ['marketing'], desc: 'Cold email, pipeline review, forecast.' },
  { id: 'f-design', label: 'Design (arte/poster)', type: 'ferramenta', areas: ['conteudo'], desc: 'Criar posters, PDFs, designs visuais.' },
  { id: 'f-docs', label: 'Documentos (Word/PDF/PPT/Excel)', type: 'ferramenta', areas: ['conteudo'], desc: 'Criar e editar docx, xlsx, pptx, pdf.' },
];

// CONEXÕES
const EDGES = [
  // Hub central → áreas
  ['anti-caos','area-tec'], ['anti-caos','area-con'], ['anti-caos','area-mkt'], ['anti-caos','area-edu'],

  // Áreas → projetos
  ['area-tec','p-assessment'], ['area-tec','p-adultos'], ['area-tec','p-lider'], ['area-tec','p-painel'],
  ['area-edu','p-assessment'], ['area-edu','p-adultos'], ['area-edu','p-lider'], ['area-edu','p-tutoriais'],
  ['area-edu','p-quest'], ['area-edu','p-livro'], ['area-edu','p-sprints'], ['area-edu','p-indice'],
  ['area-con','p-tutoriais'], ['area-con','p-sprints'], ['area-con','p-recopedro'], ['area-con','p-livro'],
  ['area-mkt','p-lider'], ['area-mkt','p-recopedro'], ['area-mkt','p-indice'], ['area-mkt','p-ltm'],

  // Áreas → ferramentas (grupos naturais)
  ['area-tec','f-plano'], ['area-tec','f-audita'],
  ['area-edu','f-disc'], ['area-edu','f-disc-jovens'], ['area-edu','f-success'], ['area-edu','f-softskills'], ['area-edu','f-mentoria'],
  ['area-con','f-aulas'], ['area-con','f-sprints'], ['area-con','f-design'], ['area-con','f-docs'], ['area-con','f-brand'],
  ['area-mkt','f-maxxima'], ['area-mkt','f-redes'], ['area-mkt','f-lowticket'], ['area-mkt','f-email'], ['area-mkt','f-vendas'], ['area-mkt','f-ideias'],

  // Projetos → ferramentas específicas
  ['p-assessment','f-disc'], ['p-assessment','f-softskills'],
  ['p-adultos','f-disc'], ['p-adultos','f-softskills'],
  ['p-lider','f-maxxima'], ['p-lider','f-brand'], ['p-lider','f-email'],
  ['p-painel','f-audita'],
  ['p-tutoriais','f-aulas'], ['p-tutoriais','f-brand'],
  ['p-recopedro','f-redes'],
  ['p-indice','f-ideias'],
  ['p-sprints','f-sprints'],
  ['p-quest','f-disc-jovens'],
  ['p-livro','f-disc'], ['p-livro','f-docs'],
  ['p-ltm','f-lowticket'], ['p-ltm','f-vendas'],
];

// ── CYTOSCAPE ──────────────────────────────────────────────────────────────
const TYPE_COLORS = {
  hub:        { bg: '#1D1D1F', border: '#E8611A' },
  projeto:    { bg: '#E8611A', border: '#C44E14' },
  ferramenta: { bg: '#0D9488', border: '#0A6F68' },
};
const TYPE_SIZES = { hub: 110, projeto: 56, ferramenta: 44 };
const TYPE_LABELS = { hub: 'Área', projeto: 'Projeto', ferramenta: 'Ferramenta' };

const cy = cytoscape({
  container: document.getElementById('cy'),
  elements: [
    ...NODES.map(n => ({
      data: {
        id: n.id, label: n.label, type: n.type, areas: n.areas,
        desc: n.desc, url: n.url || null,
        bg: TYPE_COLORS[n.type].bg, border: TYPE_COLORS[n.type].border,
        size: TYPE_SIZES[n.type],
      }
    })),
    ...EDGES.map(([s, t]) => ({ data: { id: `${s}__${t}`, source: s, target: t } })),
  ],
  style: [
    {
      selector: 'node',
      style: {
        'background-color': 'data(bg)',
        'border-color': 'data(border)',
        'border-width': 2,
        'width': 'data(size)',
        'height': 'data(size)',
        'label': 'data(label)',
        'font-family': '-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif',
        'font-weight': 600,
        'font-size': 11.5,
        'color': '#1D1D1F',
        'text-outline-color': '#F2F2F7',
        'text-outline-width': 3,
        'text-valign': 'bottom',
        'text-halign': 'center',
        'text-margin-y': 5,
        'text-wrap': 'wrap',
        'text-max-width': 130,
      }
    },
    {
      selector: 'node[type="hub"]',
      style: {
        'color': '#FFFFFF',
        'font-size': 14,
        'font-weight': 700,
        'text-valign': 'center',
        'text-halign': 'center',
        'text-margin-y': 0,
        'text-outline-width': 0,
        'text-max-width': 90,
        'text-wrap': 'wrap',
      }
    },
    {
      selector: 'edge',
      style: {
        'width': 1.2,
        'line-color': '#C7C7CC',
        'curve-style': 'bezier',
        'opacity': 0.5,
      }
    },
    {
      selector: 'node:selected',
      style: { 'border-width': 4, 'border-color': '#E8611A' }
    },
    {
      selector: 'edge.highlighted',
      style: { 'line-color': '#E8611A', 'width': 2.5, 'opacity': 1, 'z-index': 10 }
    },
    { selector: 'node.dim', style: { 'opacity': 0.2 } },
    { selector: 'edge.dim', style: { 'opacity': 0.08 } },
  ],
  layout: {
    name: 'cose',
    animate: true,
    animationDuration: 800,
    nodeRepulsion: 16000,
    idealEdgeLength: 140,
    edgeElasticity: 120,
    gravity: 0.8,
    padding: 80,
    fit: true,
  },
  wheelSensitivity: 0.25,
  minZoom: 0.3,
  maxZoom: 3,
});

// Filtros
let currentArea = 'all';
document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const area = chip.dataset.area;
    currentArea = area;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c === chip));

    cy.batch(() => {
      cy.nodes().forEach(n => {
        const areas = n.data('areas') || [];
        const show = area === 'all' || areas.includes(area);
        n.style('display', show ? 'element' : 'none');
      });
      cy.edges().forEach(e => {
        const src = e.source(); const tgt = e.target();
        const show = src.style('display') !== 'none' && tgt.style('display') !== 'none';
        e.style('display', show ? 'element' : 'none');
      });
    });
    cy.animate({ fit: { padding: 60 }, duration: 400 });
  });
});

// Click em nó
const nd = document.getElementById('node-detail');
const ndType = document.getElementById('nd-type');
const ndName = document.getElementById('nd-name');
const ndDesc = document.getElementById('nd-desc');
const ndConnTitle = document.getElementById('nd-conn-title');
const ndConnections = document.getElementById('nd-connections');

cy.on('tap', 'node', (evt) => {
  const n = evt.target;

  cy.elements().removeClass('highlighted dim').addClass('dim');
  n.removeClass('dim');
  const connectedEdges = n.connectedEdges();
  connectedEdges.removeClass('dim').addClass('highlighted');
  connectedEdges.connectedNodes().removeClass('dim');

  ndType.textContent = TYPE_LABELS[n.data('type')] || 'Nó';
  ndName.textContent = n.data('label');
  const desc = n.data('desc') || '';
  const url = n.data('url');
  ndDesc.innerHTML = desc + (url ? `<br><a href="${url}" target="_blank" rel="noopener" style="color:#E8611A; font-weight:600; font-size:12px;">↗ Abrir</a>` : '');

  const connected = connectedEdges.connectedNodes().filter(x => x.id() !== n.id());
  if (connected.length > 0) {
    ndConnTitle.style.display = 'block';
    ndConnections.innerHTML = '';
    connected.forEach(c => {
      const chip = document.createElement('span');
      chip.className = 'node-detail-connection';
      chip.textContent = c.data('label');
      chip.addEventListener('click', () => {
        cy.$(`#${c.id()}`).trigger('tap');
        cy.animate({ center: { eles: c }, duration: 400 });
      });
      ndConnections.appendChild(chip);
    });
  } else {
    ndConnTitle.style.display = 'none';
    ndConnections.innerHTML = '';
  }

  nd.classList.add('open');
});

cy.on('tap', (evt) => {
  if (evt.target === cy) {
    cy.elements().removeClass('highlighted dim');
    nd.classList.remove('open');
  }
});

document.getElementById('node-detail-close').addEventListener('click', () => {
  nd.classList.remove('open');
  cy.elements().removeClass('highlighted dim');
});

document.getElementById('zoom-in').addEventListener('click', () => {
  cy.zoom({ level: cy.zoom() * 1.25, renderedPosition: { x: cy.width()/2, y: cy.height()/2 } });
});
document.getElementById('zoom-out').addEventListener('click', () => {
  cy.zoom({ level: cy.zoom() / 1.25, renderedPosition: { x: cy.width()/2, y: cy.height()/2 } });
});
document.getElementById('fit').addEventListener('click', () => {
  cy.animate({ fit: { padding: 60 }, duration: 500 });
});
</script>
</body>
</html>
